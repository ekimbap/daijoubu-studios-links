<!DOCTYPE html>

<!--
  LittleLink-compatible Daijoubu Studios link page.
  Button anchors keep the standard `.button` and `.button-*` classes so the
  existing LittleLink brand data and styles remain easy to update.
-->

<html class="theme-light" lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Daijoubu Studios | Links</title>
    <link rel="icon" type="image/png" href="images/daijoubu-logo.png">

    <meta name="description" content="Official links for Daijoubu Studios across YouTube, TikTok, X, Patreon, and upcoming community pages.">
    <meta name="keywords" content="Daijoubu Studios, djbstudios.marketing@gmail.com, YouTube, TikTok, X, Patreon">
    <meta rel="canonical" href="https://daijoubustudios.com">
    <meta name="author" content="Daijoubu Studios">

    <meta property="og:title" content="Daijoubu Studios | Links">
    <meta property="og:description" content="Official Daijoubu Studios links and upcoming community pages.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/daijoubu-logo.png">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">
    <link rel="stylesheet" href="css/daijoubu.css">
  </head>

  <body class="daijoubu-page">

    <main class="container" aria-labelledby="profile-name">
      <div class="column">

        <button class="share-button" type="button" aria-label="Share Daijoubu Studios links" data-share-button>
          <svg class="share-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
            <path d="M8 7.5 12 3l4 4.5M12 3v12M5 11v8h14v-8"/>
          </svg>
          <span class="share-status" data-share-status>Copied</span>
        </button>

        <img class="avatar avatar--rounded daijoubu-avatar" src="images/daijoubu-profile.png" alt="Daijoubu Studios logo">

        <h1 id="profile-name">
          <span>Daijoubu Studios</span>
        </h1>

        <p class="profile-role">djbstudios.marketing@gmail.com</p>

        <div class="social-strip" aria-label="Featured social links">
          <a href="https://www.youtube.com/@Daijoubu-Studios" target="_blank" rel="noopener" aria-label="Daijoubu Studios on YouTube">
            <img class="social-icon" src="images/icons/youtube.svg" alt="">
          </a>
          <a href="https://www.tiktok.com/@daijoubu.studios" target="_blank" rel="noopener" aria-label="Daijoubu Studios on TikTok">
            <img class="social-icon" src="images/icons/tiktok.svg" alt="">
          </a>
          <a href="https://x.com/DaijoubuStudios" target="_blank" rel="noopener" aria-label="Daijoubu Studios on X">
            <img class="social-icon" src="images/icons/x.svg" alt="">
          </a>
          <a href="https://www.patreon.com/c/DaijoubuStudios" target="_blank" rel="noopener" aria-label="Daijoubu Studios on Patreon">
            <img class="social-icon" src="images/icons/patreon.svg" alt="">
          </a>
        </div>

        <div class="button-stack" role="navigation" aria-label="Daijoubu Studios links">

          <a class="button button-yt" href="https://www.youtube.com/@Daijoubu-Studios" target="_blank" rel="noopener" role="button">
            <img class="icon" aria-hidden="true" src="images/icons/youtube.svg" alt="YouTube Logo">YouTube
          </a>

          <a class="button button-tiktok" href="https://www.tiktok.com/@daijoubu.studios" target="_blank" rel="noopener" role="button">
            <img class="icon" aria-hidden="true" src="images/icons/tiktok.svg" alt="TikTok Logo">TikTok
          </a>

          <a class="button button-x" href="https://x.com/DaijoubuStudios" target="_blank" rel="noopener" role="button">
            <img class="icon" aria-hidden="true" src="images/icons/x.svg" alt="X Logo">X.com
          </a>

          <a class="button button-patreon" href="https://www.patreon.com/c/DaijoubuStudios" target="_blank" rel="noopener" role="button">
            <img class="icon" aria-hidden="true" src="images/icons/patreon.svg" alt="Patreon Logo">Patreon
          </a>

          <a class="button button-reddit button-coming-soon" href="#" aria-disabled="true" tabindex="-1" role="button">
            <img class="icon" aria-hidden="true" src="images/icons/reddit.svg" alt="Reddit Logo">Reddit
          </a>

          <a class="button button-itch-io button-coming-soon" href="#" aria-disabled="true" tabindex="-1" role="button">
            <img class="icon" aria-hidden="true" src="images/icons/itch-io.svg" alt="Itch.io Logo">Itch.io
          </a>

          <a class="button button-steam button-coming-soon" href="#" aria-disabled="true" tabindex="-1" role="button">
            <img class="icon" aria-hidden="true" src="images/icons/steam.svg" alt="Steam Logo">Steam
          </a>

          <a class="button button-kickstarter button-coming-soon" href="#" aria-disabled="true" tabindex="-1" role="button">
            <img class="icon" aria-hidden="true" src="images/icons/kickstarter.svg" alt="Kickstarter Logo">Kickstarter
          </a>

          <a class="button button-discord button-coming-soon" href="#" aria-disabled="true" tabindex="-1" role="button">
            <img class="icon" aria-hidden="true" src="images/icons/discord.svg" alt="Discord Logo">Discord
          </a>

        </div>
      </div>
    </main>

    <script src="js/share.js"></script>

  </body>

</html>
